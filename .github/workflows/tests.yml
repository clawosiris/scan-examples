name: tests

on:
  push:
    branches: [main, devel]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
          enable-cache: true
      - name: Sync package + test deps
        run: uv sync --locked --extra dev
      - name: Run unit tests
        run: uv run pytest

  e2e:
    needs: unit
    runs-on: [self-hosted, Linux, X64, hetzner-vps-scan-examples, scan-examples-e2e]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: Show Docker environment
        run: |
          docker --version
          docker compose version
      - name: Create artifact directory
        run: mkdir -p artifacts
      - name: Build fresh example service image
        run: docker compose build --pull example
      - name: Start community scanner stack and target
        run: docker compose up -d vulnerability-tests notus-data data-objects gpg-data redis-server configure-openvas openvasd target
      - name: Run end-to-end custom scan config test
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" && "$GITHUB_REF" == "refs/heads/main" ]]; then
            completion_mode="scan-complete"
            results_timeout="5400"
            no_findings_increment_timeout="1500"
          else
            completion_mode="first-results"
            results_timeout="1800"
            no_findings_increment_timeout="0"
          fi
          echo "Using e2e completion mode: ${completion_mode}"
          echo "Using no-findings-increment timeout: ${no_findings_increment_timeout}s"
          docker compose run --rm \
            -v "$PWD/artifacts:/artifacts" \
            -e SCAN_CONFIG_JSON=/app/scanconfigs/scanconfig-modified.json.zip \
            -e E2E_COMPLETION_MODE="${completion_mode}" \
            -e E2E_NO_FINDINGS_INCREMENT_TIMEOUT="${no_findings_increment_timeout}" \
            example e2e --host target \
              --wait-before-results 45 \
              --results-timeout "${results_timeout}" \
              --results-poll-interval 30 \
              --output /artifacts/scan-results.json
      - name: Collect compose logs
        if: always()
        run: docker compose logs --no-color > artifacts/docker-compose.log
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-examples-e2e-artifacts
          path: artifacts/
      - name: Tear down stack but keep feed volumes cached
        if: always()
        run: |
          docker compose down --remove-orphans
          docker volume rm -f \
            scan-examples_redis_socket_vol \
            scan-examples_openvas_data_vol \
            scan-examples_openvas_log_data_vol || true
