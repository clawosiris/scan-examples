name: scan-examples

services:
  vulnerability-tests:
    image: registry.community.greenbone.net/community/vulnerability-tests
    environment:
      FEED_RELEASE: "24.10"
      KEEP_ALIVE: 1
    volumes:
      - vt_data_vol:/mnt

  notus-data:
    image: registry.community.greenbone.net/community/notus-data
    environment:
      KEEP_ALIVE: 1
    volumes:
      - notus_data_vol:/mnt

  data-objects:
    image: registry.community.greenbone.net/community/data-objects
    environment:
      FEED_RELEASE: "24.10"
      KEEP_ALIVE: 1
    volumes:
      - data_objects_vol:/mnt

  gpg-data:
    image: registry.community.greenbone.net/community/gpg-data
    volumes:
      - gpg_data_vol:/mnt

  redis-server:
    image: registry.community.greenbone.net/community/redis-server
    volumes:
      - redis_socket_vol:/run/redis/

  configure-openvas:
    image: registry.community.greenbone.net/community/openvas-scanner:stable
    volumes:
      - openvas_data_vol:/mnt
      - openvas_log_data_vol:/var/log/openvas
    command:
      - /bin/sh
      - -c
      - |
        printf "table_driven_lsc = yes\nopenvasd_server = http://openvasd:80\n" > /mnt/openvas.conf
        sed "s/127/128/" /etc/openvas/openvas_log.conf | sed 's/gvm/openvas/' > /mnt/openvas_log.conf
        chmod 644 /mnt/openvas.conf /mnt/openvas_log.conf
        touch /var/log/openvas/openvas.log
        chmod 666 /var/log/openvas/openvas.log

  openvasd:
    image: registry.community.greenbone.net/community/openvas-scanner:stable
    environment:
      GNUPGHOME: /etc/openvas/gnupg
      LISTENING: 0.0.0.0:80
    ports:
      - "3000:80"
    volumes:
      - openvas_data_vol:/etc/openvas
      - openvas_log_data_vol:/var/log/openvas
      - gpg_data_vol:/etc/openvas/gnupg
      - notus_data_vol:/var/lib/notus
      - vt_data_vol:/var/lib/openvas/plugins
      - ospd_openvas_socket_vol:/var/run/ospd
    depends_on:
      vulnerability-tests:
        condition: service_healthy
      notus-data:
        condition: service_healthy
      configure-openvas:
        condition: service_completed_successfully
      gpg-data:
        condition: service_completed_successfully
      ospd-openvas:
        condition: service_started

  ospd-openvas:
    image: registry.community.greenbone.net/community/ospd-openvas:stable
    hostname: ospd-openvas.local
    cap_add:
      - NET_ADMIN
      - NET_RAW
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    command:
      - ospd-openvas
      - -f
      - --config
      - /etc/gvm/ospd-openvas.conf
      - --notus-feed-dir
      - /var/lib/notus/advisories
      - -m
      - "666"
    volumes:
      - gpg_data_vol:/etc/openvas/gnupg
      - vt_data_vol:/var/lib/openvas/plugins
      - notus_data_vol:/var/lib/notus
      - ospd_openvas_socket_vol:/var/run/ospd
      - redis_socket_vol:/run/redis/
      - openvas_data_vol:/etc/openvas/
      - openvas_log_data_vol:/var/log/openvas
    depends_on:
      redis-server:
        condition: service_started
      gpg-data:
        condition: service_completed_successfully
      configure-openvas:
        condition: service_completed_successfully
      vulnerability-tests:
        condition: service_healthy
      notus-data:
        condition: service_healthy

  target:
    image: kirscht/metasploitable3-ub1404:latest
    hostname: target
    entrypoint: /entrypoint.sh
    environment:
      PASS: msfadmin
      FTP: "yes"
      HTTP: "yes"
      SMB: "yes"
      SQL: "yes"
      SSH: "yes"
    healthcheck:
      test: ["CMD", "bash", "-lc", ": >/dev/tcp/127.0.0.1/22 && : >/dev/tcp/127.0.0.1/80 && : >/dev/tcp/127.0.0.1/3306"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 30s

  example:
    build: .
    environment:
      SCANNER_API_URL: http://openvasd:80
      DATA_OBJECTS_PATH: /feed/data-objects
      VT_PATH: /feed/vulnerability-tests
      TARGET_SSH_USERNAME: msfadmin
      TARGET_SSH_PASSWORD: msfadmin
      TARGET_SSH_PORT: 22
    volumes:
      - data_objects_vol:/feed/data-objects:ro
      - vt_data_vol:/feed/vulnerability-tests:ro
    depends_on:
      openvasd:
        condition: service_started
      data-objects:
        condition: service_healthy
      target:
        condition: service_healthy

volumes:
  gpg_data_vol:
  data_objects_vol:
  vt_data_vol:
  notus_data_vol:
  ospd_openvas_socket_vol:
  redis_socket_vol:
  openvas_data_vol:
  openvas_log_data_vol:
